{% extends "layout.html" %}

{% block main %}
    <div class="conteneur_3">
        <h1>Connexion</h1>

        <form class="conteneur_2" method="POST" action="/login">

            <div class="conteneur_4">
                <label for="identifiant"><h8>Nom d'utilisateur(PSN):</h8></label>
                <input name="identifiant" id="identifiant" class="search_1" type="text" placeholder="Entrez votre nom d'utilisateur..." required>
            </div>

            <div class="conteneur_4">
                <label for="mdp_membre"><h8>Mot de Passe:</h8></label>
                <input name="mdp_membre" id="mdp_membre" class="search_1" type="password" placeholder="Entrez votre mot de passe..." required>
            </div>

            <button type="submit" class="btn_1 btn_green">Se connecter</button>

        </form>

    </div>

    <h5>Pas encore de compte ?
        <a href="{{ url_for('auth.register_step1') }}">
            <h9>Inscrivez-vous</h9>
        </a>
    </h5>
{% endblock %}
